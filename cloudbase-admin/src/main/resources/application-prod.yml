# 生产环境配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cloudbase}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:root}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 10
      min-idle: 10
      max-active: 50

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

pom:
  logging:
    path: /var/log/cloudbase

cloudbase:
  cache:
    type: redis
  # 生产环境关闭 Druid 监控页面（或通过 allow 限制 IP）
  druid:
    enabled: true
    allow: 127.0.0.1
  # 生产 CORS 配置
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  # 生产文件存储路径
  storage:
    base-path: /var/uploads/cloudbase

# 生产环境关闭 mybatis-plus SQL日志输出
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 生产环境 Actuator 仅暴露 health 和 info
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.cloudbase: warn
    org.springframework: warn
